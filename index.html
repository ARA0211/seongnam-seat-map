<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>성남 캠퍼스 자리배치도</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; background: #faf9f6; padding: 32px 24px; }
  h1 { font-size: 20px; font-weight: 600; color: #1a1a2e; margin-bottom: 4px; }
  .sub { font-size: 12px; color: #888; margin-bottom: 24px; }
  .layout { display: flex; gap: 16px; align-items: flex-start; }
  .left-col { display: flex; flex-direction: column; gap: 12px; flex-shrink: 0; }
  .right-col { display: flex; flex-direction: column; gap: 8px; flex: 1; }
  .cell { border-radius: 10px; padding: 10px 14px; text-align: center; font-size: 13px; font-weight: 500; border: 1.5px solid; transition: transform 0.15s; }
  .cell:hover { transform: translateY(-1px); }
  .pink-card { background:#fde8ec; border:1.5px solid #f4b8c4; color:#a03050; min-width:90px; }
  .name-sm { font-size: 11px; margin-top: 3px; opacity: 0.85; }
  .row { display: flex; gap: 8px; }
  .w1 { min-width: 80px; }
  .w2 { min-width: 168px; }
  .groups { display: flex; gap: 24px; }
  .group { display: flex; flex-direction: column; gap: 8px; }
</style>
</head>
<body>
  <h1>🏢 성남 캠퍼스 자리배치도</h1>
  <p class="sub">seatmap.csv 수정 후 GitHub 업로드 시 자동 반영됩니다</p>
  <div class="layout">
    <div class="left-col">
      <div class="cell" style="background:#e8eaf0;border:1.5px solid #c9cdd6;color:#555;width:110px;height:200px;display:flex;align-items:center;justify-content:center;">대회의실</div>
      <div class="cell" style="background:#ddeaf8;border:1.5px solid #a8c8e8;color:#2a5f8a;width:110px;min-height:110px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;">
        <div style="font-weight:600;">R&D Center</div>
        <div class="name-sm">김지아</div><div class="name-sm">박진하</div>
      </div>
    </div>
    <div class="right-col">
      <div class="row">
        <div class="cell pink-card"><div style="font-weight:600;">CEO</div><div class="name-sm">이소형</div></div><div class="cell pink-card"><div style="font-weight:600;">COO</div><div class="name-sm">김아리</div></div>
        <div class="cell" style="background:#e8eaf0;border:1.5px solid #c9cdd6;color:#555;min-width:90px;display:flex;align-items:center;justify-content:center;">회의실</div>
      </div>
      <div class="groups">
        <div class="group"><div class="row"><div class="cell w2" style="background:#e0f4f0;border:1.5px solid #8ed4c8;color:#1a6b5e;">정언식</div></div><div class="row"><div class="cell w1" style="background:#e0f4f0;border:1.5px solid #8ed4c8;color:#1a6b5e;">고정인</div><div class="cell w1" style="background:#e0f4f0;border:1.5px solid #8ed4c8;color:#1a6b5e;">김미란</div></div><div class="row"><div class="cell w1" style="background:#fde8d0;border:1.5px solid #f4c898;color:#a06020;">공석</div><div class="cell w1" style="background:#e0f4f0;border:1.5px solid #8ed4c8;color:#1a6b5e;">정의찬</div></div><div class="row"><div class="cell w2" style="background:#fde8ec;border:1.5px solid #f4b8c4;color:#a03050;">이아라</div></div></div>
        <div class="group"><div class="row"><div class="cell w2" style="background:#e8f4e0;border:1.5px solid #a8d890;color:#2a6a1a;">신의철</div></div><div class="row"><div class="cell w1" style="background:#e8f4e0;border:1.5px solid #a8d890;color:#2a6a1a;">정귀오</div><div class="cell w1" style="background:#ede8f8;border:1.5px solid #c4b0e8;color:#5a3a9a;">이주석</div></div><div class="row"><div class="cell w1" style="background:#e8f4e0;border:1.5px solid #a8d890;color:#2a6a1a;">최제열</div><div class="cell w1" style="background:#ede8f8;border:1.5px solid #c4b0e8;color:#5a3a9a;">최다희</div></div><div class="row"><div class="cell w2" style="background:#e8f4e0;border:1.5px solid #a8d890;color:#2a6a1a;">홍순기</div></div></div>
      </div>
    </div>
  </div>
</body>
</html>
