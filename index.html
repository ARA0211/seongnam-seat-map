<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>성남 캠퍼스 자리배치도</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    background: #faf9f6;
    padding: 32px 24px;
  }
  h1 { font-size: 20px; font-weight: 600; color: #1a1a2e; margin-bottom: 4px; }
  .sub { font-size: 12px; color: #888; margin-bottom: 24px; }
  .layout { display: flex; gap: 16px; align-items: flex-start; }
  .left { display: flex; flex-direction: column; gap: 12px; flex-shrink: 0; }
  .right { display: flex; flex-direction: column; gap: 10px; flex: 1; }
  .cell {
    border-radius: 10px;
    padding: 10px 14px;
    text-align: center;
    font-size: 13px;
    font-weight: 500;
    border: 1.5px solid;
    transition: transform 0.15s;
  }
  .cell:hover { transform: translateY(-1px); }
  .gray  { background: #e8eaf0; border-color: #c9cdd6; color: #555; }
  .blue  { background: #ddeaf8; border-color: #a8c8e8; color: #2a5f8a; }
  .pink  { background: #fde8ec; border-color: #f4b8c4; color: #a03050; }
  .teal  { background: #e0f4f0; border-color: #8ed4c8; color: #1a6b5e; }
  .green { background: #e8f4e0; border-color: #a8d890; color: #2a6a1a; }
  .purple{ background: #ede8f8; border-color: #c4b0e8; color: #5a3a9a; }
  .orange{ background: #fde8d0; border-color: #f4c898; color: #a06020; }
  .name-sm { font-size: 11px; margin-top: 3px; opacity: 0.85; }
  .row { display: flex; gap: 8px; align-items: stretch; }
  .w1 { min-width: 80px; }
  .w2 { min-width: 168px; }
</style>
</head>
<body>
  <h1>🏢 성남 캠퍼스 자리배치도</h1>
  <p class="sub">seatmap.csv 수정 후 GitHub 업로드 시 자동 반영됩니다</p>
  <div class="layout">

    <!-- 왼쪽: 대회의실 + R&D Center -->
    <div class="left">
      <div class="cell gray" style="width:110px; height:200px; display:flex; align-items:center; justify-content:center;">
        대회의실
      </div>
      <div class="cell blue" style="width:110px; min-height:110px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px;">
        <div style="font-weight:600;">R&D Center</div>
        <div class="name-sm">김지아</div>
        <div class="name-sm">박진하</div>
      </div>
    </div>

    <!-- 오른쪽: 자리 배치 -->
    <div class="right">

      <!-- 1행: CEO / COO / 회의실 -->
      <div class="row">
        <div class="cell pink w1"><div style="font-weight:600;">CEO</div><div class="name-sm">이소형</div></div>
        <div class="cell pink w1"><div style="font-weight:600;">COO</div><div class="name-sm">김아리</div></div>
        <div class="cell gray w1" style="display:flex;align-items:center;justify-content:center;">회의실</div>
      </div>

      <!-- 2행: 정언식 / 신의철 -->
      <div class="row">
        <div class="cell teal w2">정언식</div>
        <div style="min-width:16px;"></div>
        <div class="cell green w2">신의철</div>
      </div>

      <!-- 3행: 고정인 김미란 / 정귀오 이주석 -->
      <div class="row">
        <div class="cell teal w1">고정인</div>
        <div class="cell teal w1">김미란</div>
        <div style="min-width:16px;"></div>
        <div class="cell green w1">정귀오</div>
        <div class="cell purple w1">이주석</div>
      </div>

      <!-- 4행: 공석 정의찬 / 최제열 최다희 -->
      <div class="row">
        <div class="cell orange w1">공석</div>
        <div class="cell teal w1">정의찬</div>
        <div style="min-width:16px;"></div>
        <div class="cell green w1">최제열</div>
        <div class="cell purple w1">최다희</div>
      </div>

      <!-- 5행: 이아라 / 홍순기 -->
      <div class="row">
        <div class="cell pink w2">이아라</div>
        <div style="min-width:16px;"></div>
        <div class="cell green w2">홍순기</div>
      </div>

    </div>
  </div>
</body>
</html>
